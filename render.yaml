services:
  - type: web
    name: conversation-test
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/ms-playwright
      - key: PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS
        value: "1"
      - key: SITE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TARGET_URL
        sync: false
      - key: CRON_INTERVAL_MINUTES
        value: "5"
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
